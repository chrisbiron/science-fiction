<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicorn Studio Preview</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: #000;
        }
        a {
            display: none !important;
        }
        .switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 0;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }
        .switcher button {
            padding: 10px 20px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.5);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }
        .switcher button:hover {
            background: rgba(255,255,255,0.15);
        }
        .switcher button.active {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        body.light-bg {
            background: #fff;
        }
        body.light-bg .switcher button {
            background: rgba(0,0,0,0.1);
            color: rgba(0,0,0,0.5);
        }
        body.light-bg .switcher button:hover {
            background: rgba(0,0,0,0.15);
        }
        body.light-bg .switcher button.active {
            background: rgba(0,0,0,0.2);
            color: #000;
        }
        .canvas-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        #scene-container {
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="switcher" id="switcher"></div>
    <div class="canvas-wrapper">
        <div id="scene-container"></div>
    </div>

    <script>
        // --- Scene config ---
        const scenes = [
            { label: 'Scene 1', project: 'f6e6KS81bGuePpMBdJAZ', width: 1440, height: 900 },
            { label: 'Scene 2', project: 'Z244AuHbFzaGjvW3YEFi', width: 1440, height: 900 },
            { label: 'Scene 3', project: '2kGJ2bqu59WCaMh2GrvB', width: 1431, height: 516, bg: 'light' },
            { label: 'Scene 4', project: 'mnLLdMphpyZXNqlaHyeZ', width: 1440, height: 900 },
            { label: 'Scene 5', project: 'HTasbroX8s5bMCU9sGEi', width: 1440, height: 900 },
            { label: 'Scene 6', project: '7JgIQYv8mO8eHgMV52X2', width: 1440, height: 900 },
            { label: 'Scene 7', project: '5sKS8qHd8SCbEDWl3uGH', width: 1440, height: 900 },
            { label: 'Experiment', iframe: 'experiment.html', width: 1440, height: 900 }
        ];

        let currentScene = -1;
        let usReady = false;
        const container = document.getElementById('scene-container');
        const switcher = document.getElementById('switcher');

        // Build switcher buttons
        scenes.forEach((scene, i) => {
            const btn = document.createElement('button');
            btn.textContent = scene.label;
            btn.addEventListener('click', () => switchScene(i));
            switcher.appendChild(btn);
        });

        // Load Unicorn Studio script once
        function loadUnicornStudio() {
            return new Promise((resolve) => {
                if (window.UnicornStudio && window.UnicornStudio.init) {
                    resolve();
                    return;
                }
                window.UnicornStudio = { isInitialized: false };
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v2.1.4/dist/unicornStudio.umd.js';
                script.onload = () => resolve();
                document.head.appendChild(script);
            });
        }

        async function switchScene(index) {
            if (index === currentScene) return;

            // Update buttons
            switcher.querySelectorAll('button').forEach((b, i) => {
                b.classList.toggle('active', i === index);
            });

            // Fade out
            container.style.opacity = '0';
            await new Promise(r => setTimeout(r, 200));

            // Tear down current scene — destroy Unicorn Studio instances and remove DOM
            if (window.UnicornStudio && window.UnicornStudio.destroy) {
                try { UnicornStudio.destroy(); } catch(e) {}
            }
            container.innerHTML = '';

            const scene = scenes[index];
            currentScene = index;

            // Background
            if (scene.bg === 'light') {
                document.body.classList.add('light-bg');
            } else {
                document.body.classList.remove('light-bg');
            }

            // Build new scene
            if (scene.iframe) {
                const iframe = document.createElement('iframe');
                iframe.src = scene.iframe;
                iframe.style.width = scene.width + 'px';
                iframe.style.height = scene.height + 'px';
                iframe.style.border = 'none';
                container.appendChild(iframe);
            } else {
                const div = document.createElement('div');
                div.style.width = scene.width + 'px';
                div.style.height = scene.height + 'px';
                div.setAttribute('data-us-project', scene.project);
                container.appendChild(div);

                // Init Unicorn Studio for this single element
                await loadUnicornStudio();
                if (window.UnicornStudio && window.UnicornStudio.init) {
                    UnicornStudio.init();
                }
            }

            // Fade in
            container.style.opacity = '1';
        }

        // Load first scene
        switchScene(0);
    </script>
</body>
</html>
