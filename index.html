<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicorn Studio Preview</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: #000;
        }
        a {
            display: none !important;
        }
        .switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 0;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }
        .switcher button {
            padding: 10px 20px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.5);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }
        .switcher button:hover {
            background: rgba(255,255,255,0.15);
        }
        .switcher button.active {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        body.light-bg {
            background: #fff;
        }
        body.light-bg .switcher button {
            background: rgba(0,0,0,0.1);
            color: rgba(0,0,0,0.5);
        }
        body.light-bg .switcher button:hover {
            background: rgba(0,0,0,0.15);
        }
        body.light-bg .switcher button.active {
            background: rgba(0,0,0,0.2);
            color: #000;
        }
        .canvas-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .scene {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .scene.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="switcher">
        <button class="active" onclick="switchScene(0)">Scene 1</button>
        <button onclick="switchScene(1)">Scene 2</button>
        <button onclick="switchScene(2)">Scene 3</button>
        <button onclick="switchScene(3)">Scene 4</button>
        <button onclick="switchScene(4)">Scene 5</button>
    </div>

    <div class="canvas-wrapper">
        <div class="scene active" id="scene-0">
            <div style="width: 1440px; height: 900px" data-us-project="f6e6KS81bGuePpMBdJAZ"></div>
        </div>
        <div class="scene" id="scene-1">
            <div style="width: 1440px; height: 900px" data-us-project="Z244AuHbFzaGjvW3YEFi"></div>
        </div>
        <div class="scene" id="scene-2" data-bg="light">
            <div style="width: 1431px; height: 516px" data-us-project="2kGJ2bqu59WCaMh2GrvB"></div>
        </div>
        <div class="scene" id="scene-3">
            <div style="width: 900px; height: 900px" data-us-project="7UWmcmyu6W8Lrjl8C7Tk"></div>
        </div>
        <div class="scene" id="scene-4">
            <div style="width: 1440px; height: 900px" data-us-project="mnLLdMphpyZXNqlaHyeZ"></div>
        </div>
    </div>

    <script>
        function switchScene(index) {
            document.querySelectorAll('.scene').forEach((s, i) => {
                s.classList.toggle('active', i === index);
            });
            document.querySelectorAll('.switcher button').forEach((b, i) => {
                b.classList.toggle('active', i === index);
            });
            var activeScene = document.getElementById('scene-' + index);
            if (activeScene && activeScene.dataset.bg === 'light') {
                document.body.classList.add('light-bg');
            } else {
                document.body.classList.remove('light-bg');
            }
        }
    </script>

    <script type="text/javascript">!function(){var u=window.UnicornStudio;if(u&&u.init){if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",function(){u.init()})}else{u.init()}}else{window.UnicornStudio={isInitialized:!1};var i=document.createElement("script");i.src="https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v2.1.4/dist/unicornStudio.umd.js",i.onload=function(){if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",function(){UnicornStudio.init()})}else{UnicornStudio.init()}},(document.head||document.body).appendChild(i)}}();</script>
</body>
</html>
